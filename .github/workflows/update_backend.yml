name: update_backend

# Nightly, independent backend pipeline:
#   abap2UI5 mirror -> abap2UI5 transpile -> build core
# Refreshes core/srv/z2ui5 from the abap2UI5 framework sources.
# Runs on its own schedule, independent of update_samples / update_frontend.

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC nightly
  workflow_dispatch:
  workflow_call: # chained by trigger_update

permissions:
  contents: write

concurrency:
  group: update_backend
  cancel-in-progress: false

jobs:
  mirror:
    uses: ./.github/workflows/abap2ui5_mirror.yml
  transpile:
    needs: mirror
    uses: ./.github/workflows/abap2ui5_transpile.yml
  build_core:
    needs: transpile
    uses: ./.github/workflows/build_core.yml
  trigger_cap:
    # idempotent: pushes only when core/ actually changed since the last trigger
    needs: build_core
    uses: ./.github/workflows/trigger_cap.yml
    secrets: inherit
