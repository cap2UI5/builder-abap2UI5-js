name: app prepare

# Build the ready-to-serve frontend from run/input/app/webapp into
# run/output/app (1:1 copy + the cap2UI5-specific patches applied by
# patch-frontend.js). Step 2 of the update_frontend pipeline; also runnable
# standalone.

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run prepare_app
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add run/output/app
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "prepare: update run/output/app ($(cut -c1-12 run/input/app/UPSTREAM_COMMIT))"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin "HEAD:${{ github.ref_name }}"
          fi
